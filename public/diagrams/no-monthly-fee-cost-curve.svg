<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="No-monthly-fee device vs. monitored subscription">
<rect width="800" height="420" fill="#ffffff"/>
<text x="40" y="40" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#111827">No-monthly-fee device vs. monitored subscription</text>
<text x="40" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280">Cumulative cost over 3 years — one-time devices call 911 or family directly instead of a monitoring center</text>
<line x1="56" y1="88" x2="580" y2="88" stroke="#d1d5db"/><text x="50" y="92" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">$1,100</text><line x1="56" y1="157" x2="580" y2="157" stroke="#d1d5db"/><text x="50" y="161" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">$825</text><line x1="56" y1="226" x2="580" y2="226" stroke="#d1d5db"/><text x="50" y="230" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">$550</text><line x1="56" y1="295" x2="580" y2="295" stroke="#d1d5db"/><text x="50" y="299" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">$275</text><line x1="56" y1="364" x2="580" y2="364" stroke="#d1d5db"/><text x="50" y="368" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">$0</text><text x="56" y="384" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">Month 0</text><text x="230.66666666666666" y="384" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">12 mo</text><text x="405.3333333333333" y="384" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">24 mo</text><text x="580" y="384" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">36 mo</text><line x1="56" y1="313.8181818181818" x2="580" y2="313.8181818181818" stroke="#1a5f7a" stroke-width="3"/><path d="M 56 364 L 580 183.7970909090909" stroke="#b45309" stroke-width="3" fill="none"/><rect x="594" y="96" width="14" height="4" fill="#1a5f7a"/><text x="614" y="102" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">One-time device (~$200,</text><text x="614" y="118" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">no professional monitoring)</text><rect x="594" y="136" width="14" height="4" fill="#b45309"/><text x="614" y="142" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">Monitored plan ($19.95/mo,</text><text x="614" y="158" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111827">24/7 monitoring center)</text><text x="594" y="192" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#111827">Break-even: ~10 months.</text><text x="594" y="210" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">The trade-off isn't price —</text><text x="594" y="226" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">it's who answers the call.</text>
</svg>