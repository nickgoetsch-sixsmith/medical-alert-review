<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" role="img" aria-label="How automatic fall detection works">
<rect width="800" height="300" fill="#ffffff"/>
<text x="40" y="40" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#111827">How automatic fall detection works</text>
<text x="40" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280">The sequence every monitored fall-detection device follows after a detected fall</text>
<rect x="24" y="92" width="176" height="150" rx="10" fill="#e8f4f8" stroke="#1a5f7a" stroke-opacity="0.25"/><circle cx="50" cy="120" r="13" fill="#1a5f7a"/><text x="50" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#fff">1</text><text x="70" y="125" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#111827">Fall detected</text><text x="38" y="156" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">Accelerometer senses a</text><text x="38" y="173" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">sudden drop and impact,</text><text x="38" y="190" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">then stillness.</text><rect x="216" y="92" width="176" height="150" rx="10" fill="#e8f4f8" stroke="#1a5f7a" stroke-opacity="0.25"/><circle cx="242" cy="120" r="13" fill="#1a5f7a"/><text x="242" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#fff">2</text><text x="262" y="125" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#111827">Cancel window</text><text x="230" y="156" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">Device beeps 15–30 sec —</text><text x="230" y="173" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">user can cancel a false</text><text x="230" y="190" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">alarm before it dials.</text><rect x="408" y="92" width="176" height="150" rx="10" fill="#e8f4f8" stroke="#1a5f7a" stroke-opacity="0.25"/><circle cx="434" cy="120" r="13" fill="#1a5f7a"/><text x="434" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#fff">3</text><text x="454" y="125" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#111827">Center connects</text><text x="422" y="156" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">If not cancelled, it auto-</text><text x="422" y="173" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">dials the 24/7 monitoring</text><text x="422" y="190" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">center. No button press.</text><rect x="600" y="92" width="176" height="150" rx="10" fill="#e8f4f8" stroke="#1a5f7a" stroke-opacity="0.25"/><circle cx="626" cy="120" r="13" fill="#1a5f7a"/><text x="626" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#fff">4</text><text x="646" y="125" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#111827">Help dispatched</text><text x="614" y="156" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">Operator speaks through</text><text x="614" y="173" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">the device, calls EMS, and</text><text x="614" y="190" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#374151">notifies family contacts.</text>
</svg>